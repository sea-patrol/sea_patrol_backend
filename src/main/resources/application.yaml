spring:
  application:
    name: sea.patrol

jwt:
  # Do not commit real secrets. Provide via env (see ai-docs/PROJECT_INFO.md).
  # One of these must be set:
  # - JWT_SECRET (raw string, >= 32 bytes recommended)
  # - JWT_SECRET_BASE64 (base64/base64url-encoded bytes, >= 32 bytes after decoding)
  secret: ${JWT_SECRET:b5f59337a612a2a7dc07328f3e7d1a04722967c7f06df20a499a7d3f91ff2a7e}
  secret-base64: ${JWT_SECRET_BASE64:}
  expiration: ${JWT_EXPIRATION:3600}
  issuer: ${JWT_ISSUER:seapatrol}

game:
  room:
    default-room-name: ${GAME_DEFAULT_ROOM_NAME:main}
    update-period: ${GAME_ROOM_UPDATE_PERIOD:100ms}
    max-rooms: ${GAME_MAX_ROOMS:5}
    max-players-per-room: ${GAME_MAX_PLAYERS_PER_ROOM:100}
    reconnect-grace-period: ${GAME_RECONNECT_GRACE_PERIOD:15s}

